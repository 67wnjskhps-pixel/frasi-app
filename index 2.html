<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Approfondimento Biblico</title>
<meta name="theme-color" content="#5B3C88"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none';"/>
<meta name="referrer" content="no-referrer"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Approfondimento"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" integrity="sha512-8Q6Y9XnTbOE+JNvjBQwJ2H8S+UV4uA6hiRykhdtIyDYZ2TprdNmWOUaKdGzOhyr4dCyk287OejbPvwl7lrfqrQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" integrity="sha512-MOCpqoRoisCTwJ8vQQiciZv0qcpROCidek3GTFS6KTk2+y7munJIlKCVkFCYY+p3ErYFXCjmFjnfTTRSC1OHWQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" integrity="sha512-BfcEFQ1SddlO+7JRhcagE5aEc/jc+KUtCsMGjzwkM4WHPgdHmGaYQPmW9snfgfU73cGW7+9sjdk70YErPPVi0w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdn.tailwindcss.com" referrerpolicy="no-referrer"></script>
<style>
  html,body,#root{height:100%;margin:0;}
  body{-webkit-tap-highlight-color:transparent;}
  .inp:focus{outline:none;border-color:#5B3C88;}
  .btn-opt:active{background-color:rgba(91,60,136,0.08);border-color:#5B3C88;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState } = React;

const CP  = "#5B3C88"; /* primary   */
const CS  = "#496CA5"; /* secondary */
const CT  = "#292929"; /* text primary */
const CT2 = "#496CA5"; /* text secondary */

const GS = [
  ["#5B3C88","#496CA5"],["#f093fb","#f5576c"],["#4facfe","#00f2fe"],
  ["#43e97b","#38f9d7"],["#fa709a","#fee140"],["#30cfd0","#667eea"],
  ["#a18cd1","#fbc2eb"],["#fccb90","#d57eeb"],["#96fbc4","#f9f586"],
  ["#f6d365","#fda085"],["#89f7fe","#66a6ff"],["#fddb92","#d1fdff"],
];
const grad    = i => { const g = GS[((i%GS.length)+GS.length)%GS.length]; return `linear-gradient(135deg,${g[0]},${g[1]})`; };
const dayN    = () => Math.floor(Date.now()/86400000);
const todayStr = () => new Date().toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"});

const STORAGE_KEY = "frasi-motivazionali-v1";
function loadQ(){ try{ const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):[]; }catch{ return []; } }
function saveQ(d){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); }catch{} }

function buildEx(quote,allQ){
  const words=quote.text.split(/\s+/);
  const elig=words.map((raw,i)=>({raw,clean:raw.replace(/[^a-zA-ZÀ-ÿ]/g,""),i})).filter(x=>x.clean.length>3);
  if(!elig.length) return {words,blanks:{}};
  const n=Math.min(3,elig.length);
  const chosen=[...elig].sort(()=>Math.random()-.5).slice(0,n);
  const cCleans=new Set(chosen.map(x=>x.clean.toLowerCase()));
  const pool=new Set();
  allQ.forEach(q=>q.text.split(/\s+/).forEach(w=>{ const c=w.replace(/[^a-zA-ZÀ-ÿ]/g,""); if(c.length>3&&!cCleans.has(c.toLowerCase())) pool.add(w); }));
  const poolA=[...pool];
  const blanks={};
  chosen.forEach(({raw,clean,i})=>{
    const dist=poolA.filter(w=>w.replace(/[^a-zA-ZÀ-ÿ]/g,"").toLowerCase()!==clean.toLowerCase()).sort(()=>Math.random()-.5).slice(0,3);
    while(dist.length<3) dist.push("•••");
    blanks[i]={raw,options:[raw,...dist].sort(()=>Math.random()-.5)};
  });
  return {words,blanks};
}

/* ─── APP ─────────────────────────────────────────────────────────── */
function App(){
  const [view,setView]=useState("home");
  const [quotes,setQuotes]=useState(()=>loadQ());
  const update=q=>{ setQuotes(q); saveQ(q); };

  return (
    <div className="flex flex-col h-screen bg-gray-50 max-w-md mx-auto overflow-hidden">
      <div className="flex-1 overflow-y-auto overflow-x-hidden">
        {view==="home"   && <HomeView   quotes={quotes}/>}
        {view==="manage" && <ManageView quotes={quotes} update={update}/>}
        {view==="study"  && <StudyView  quotes={quotes}/>}
      </div>
      <nav className="bg-white border-t border-gray-100 flex shrink-0"
           style={{boxShadow:"0 -1px 12px rgba(0,0,0,0.06)"}}>
        {[["home","☀️","Oggi"],["manage","📚","Approfondimento"],["study","🎯","Studia"]].map(([id,em,lb])=>(
          <button key={id} onClick={()=>setView(id)}
            className="flex-1 flex flex-col items-center py-3 gap-0.5 transition-all duration-200"
            style={{color:view===id?CP:"#9ca3af"}}>
            <span className="text-xl">{em}</span>
            <span className="font-semibold" style={{fontSize:"9px",letterSpacing:"0.02em"}}>{lb}</span>
            <div className="h-0.5 w-6 rounded-full transition-all duration-300"
                 style={{background:view===id?CP:"transparent"}}/>
          </button>
        ))}
      </nav>
    </div>
  );
}

/* ─── HOME ───────────────────────────────────────────────────────── */
function HomeView({quotes}){
  const [showExpl,setShowExpl]=useState(false);

  /* Schermata di benvenuto – icona come sfondo con overlay viola */
  if(!quotes.length) return (
    <div className="relative min-h-screen flex flex-col items-center justify-center pb-24"
         style={{backgroundImage:"url('./icon-192.png')",backgroundSize:"cover",backgroundPosition:"center"}}>
      <div className="absolute inset-0" style={{backgroundColor:"rgba(91,60,136,0.82)"}}/>
      <div className="relative z-10 flex flex-col items-center gap-5 p-10 text-center">
        <span className="text-7xl">📖</span>
        <h2 className="text-xl font-bold text-white">Benvenuto!</h2>
        <p className="leading-relaxed" style={{color:"rgba(255,255,255,0.88)"}}>
          Vai su <strong className="text-white">Approfondimento</strong> per aggiungere
          i tuoi versetti preferiti. Ogni giorno ne vedrai uno diverso qui.
        </p>
      </div>
    </div>
  );

  const day=dayN();
  const q=quotes[day%quotes.length];
  const g=grad(day);

  return (
    <div>
      {/* Intestazione con gradiente */}
      <div className="relative overflow-hidden" style={{background:g}}>
        <div className="absolute -top-10 -right-10 w-48 h-48 rounded-full bg-white/10"/>
        <div className="absolute -bottom-14 -left-10 w-60 h-60 rounded-full bg-white/10"/>
        <div className="absolute top-1/2 right-0 w-24 h-24 rounded-full bg-white/5"/>
        <div className="relative p-6 pt-14 pb-10">
          <div className="flex items-center gap-2 mb-6">
            <span className="text-white/60 text-xs uppercase tracking-widest font-semibold">Versetto del giorno</span>
            <div className="flex-1 h-px bg-white/20"/>
          </div>
          <p className="text-white/70 text-xs font-medium mb-5">{todayStr()}</p>
          <p className="text-white/25 text-6xl font-serif leading-none select-none">"</p>
          <p className="text-white text-xl font-medium leading-relaxed px-1 -mt-2">{q.text}</p>
          <p className="text-white/25 text-6xl font-serif leading-none text-right -mt-2 select-none">"</p>
          {q.author && <p className="text-white/65 text-sm text-right mt-3 pr-1 font-medium">— {q.author}</p>}
        </div>
      </div>

      {/* Barra di progresso ciclo */}
      <div className="bg-white px-5 py-3 border-b border-gray-100 flex items-center gap-3">
        <span className="text-xs font-medium" style={{color:CT2}}>Ciclo</span>
        <div className="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
          <div className="h-full rounded-full transition-all"
               style={{width:`${((day%quotes.length)+1)/quotes.length*100}%`,background:g}}/>
        </div>
        <span className="text-xs text-gray-500 font-semibold">{(day%quotes.length)+1}/{quotes.length}</span>
      </div>

      <div className="p-4 flex flex-col gap-3">
        {/* Card approfondimento */}
        <button onClick={()=>setShowExpl(!showExpl)}
          className="w-full bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden text-left transition-shadow hover:shadow-md">
          <div className="flex items-center justify-between p-4">
            <div className="flex items-center gap-2.5">
              <span className="text-xl">📖</span>
              <span className="font-semibold text-sm" style={{color:CT}}>Approfondimento</span>
            </div>
            <div className={`w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 text-xs transition-transform duration-300 ${showExpl?"rotate-180":""}`}>▼</div>
          </div>
          {showExpl && (
            <div className="px-4 pb-5 border-t border-gray-50 pt-3">
              {q.explanation
                ? <p className="text-gray-600 text-sm leading-relaxed">{q.explanation}</p>
                : <p className="text-gray-400 text-sm italic">Nessun approfondimento aggiunto. Modificalo nella sezione "Approfondimento".</p>}
            </div>
          )}
        </button>

        {/* Info archivio */}
        <div className="bg-white rounded-2xl border border-gray-100 p-4 flex items-center gap-3">
          <div className="w-9 h-9 rounded-xl flex items-center justify-center text-lg" style={{background:grad(day+3)}}>📚</div>
          <div>
            <p className="text-xs font-semibold" style={{color:CT}}>
              {quotes.length} {quotes.length===1?"versetto":"versetti"} nel tuo archivio
            </p>
            <p className="text-xs text-gray-400">Nuovo versetto ogni mattina</p>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── MANAGE ─────────────────────────────────────────────────────── */
function ManageView({quotes,update}){
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState({text:"",author:"",explanation:""});
  const [adding,setAdding]=useState(false);
  const [confirmDel,setConfirmDel]=useState(null);

  const reset=()=>{ setAdding(false); setEditId(null); setForm({text:"",author:"",explanation:""}); };
  const save=()=>{
    if(!form.text.trim()) return;
    const clean={text:form.text.trim(),author:form.author.trim(),explanation:form.explanation.trim()};
    update(editId ? quotes.map(q=>q.id===editId?{...q,...clean}:q) : [...quotes,{id:Date.now().toString(),...clean}]);
    reset();
  };
  const startEdit=q=>{ setEditId(q.id); setForm({text:q.text,author:q.author||"",explanation:q.explanation||""}); setAdding(false); };
  const confirmDelete=()=>{ update(quotes.filter(q=>q.id!==confirmDel)); setConfirmDel(null); };
  const showForm=adding||!!editId;

  return (
    <div className="p-4 pb-24">
      <div className="flex items-center justify-between pt-10 mb-6">
        <div>
          <h1 className="text-2xl font-bold" style={{color:CT}}>I miei versetti</h1>
          <p className="text-sm text-gray-400">
            {quotes.length} {quotes.length===1?"versetto":"versetti"} salvati
          </p>
        </div>
        {!showForm && (
          <button onClick={()=>setAdding(true)}
            className="w-11 h-11 rounded-full text-white text-2xl flex items-center justify-center shadow-lg font-light"
            style={{background:grad(1)}}>+</button>
        )}
      </div>

      {showForm && (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-5">
          <div className="flex items-center gap-2 mb-4">
            <div className="w-2 h-6 rounded-full" style={{background:grad(editId?2:0)}}/>
            <h3 className="font-bold" style={{color:CT}}>{editId?"Modifica versetto":"Nuovo versetto"}</h3>
          </div>
          <textarea placeholder="Il testo del versetto... *" value={form.text}
            onChange={e=>setForm({...form,text:e.target.value})} rows={3}
            className="inp w-full border border-gray-200 rounded-xl p-3 text-sm resize-none transition-colors mb-2"/>
          <input placeholder="Libro (es: Giovanni 3 16) (opzionale)" value={form.author}
            onChange={e=>setForm({...form,author:e.target.value})}
            className="inp w-full border border-gray-200 rounded-xl p-3 text-sm transition-colors mb-2"/>
          <textarea placeholder="Approfondimento: riflessioni, contesto, note personali..." value={form.explanation}
            onChange={e=>setForm({...form,explanation:e.target.value})} rows={5}
            className="inp w-full border border-gray-200 rounded-xl p-3 text-sm resize-none transition-colors"/>
          <div className="flex gap-2 mt-4">
            <button onClick={save} className="flex-1 text-white rounded-xl py-3 text-sm font-bold shadow-sm"
              style={{background:grad(editId?2:1)}}>{editId?"Salva modifiche":"Aggiungi versetto"}</button>
            <button onClick={reset} className="flex-1 bg-gray-100 text-gray-600 rounded-xl py-3 text-sm font-medium">Annulla</button>
          </div>
        </div>
      )}

      {!quotes.length ? (
        <div className="text-center py-16">
          <div className="text-6xl mb-4">📚</div>
          <p className="font-semibold" style={{color:CT}}>Nessun versetto ancora</p>
          <p className="text-sm mt-1 text-gray-400">Premi + per aggiungerne uno</p>
        </div>
      ) : (
        <div className="flex flex-col gap-3">
          {quotes.map((q,i)=>(
            <div key={q.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="h-1.5" style={{background:grad(i)}}/>
              <div className="p-4">
                <p className="text-sm font-semibold leading-relaxed" style={{color:CT}}>"{q.text}"</p>
                {q.author && <p className="text-gray-400 text-xs mt-1.5 font-medium">— {q.author}</p>}
                {q.explanation && (
                  <p className="text-gray-500 text-xs mt-2.5 leading-relaxed"
                     style={{display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>
                    {q.explanation}
                  </p>
                )}
                <div className="flex justify-end gap-2 mt-3 pt-3 border-t border-gray-50">
                  <button onClick={()=>startEdit(q)}
                    className="text-xs font-semibold py-1.5 px-3 rounded-lg active:scale-95 transition-transform"
                    style={{color:CP,backgroundColor:CP+"1a"}}>Modifica</button>
                  <button onClick={()=>setConfirmDel(q.id)}
                    className="text-xs text-red-400 font-semibold py-1.5 px-3 rounded-lg bg-red-50 active:scale-95 transition-transform">Elimina</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {confirmDel && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-6" onClick={()=>setConfirmDel(null)}>
          <div onClick={e=>e.stopPropagation()} className="bg-white rounded-2xl p-5 max-w-sm w-full shadow-xl">
            <h3 className="font-bold text-gray-800 mb-1">Eliminare questo versetto?</h3>
            <p className="text-sm text-gray-500 mb-4">L'azione non può essere annullata.</p>
            <div className="flex gap-2">
              <button onClick={confirmDelete} className="flex-1 bg-red-500 text-white rounded-xl py-2.5 text-sm font-bold active:scale-95 transition-transform">Elimina</button>
              <button onClick={()=>setConfirmDel(null)} className="flex-1 bg-gray-100 text-gray-600 rounded-xl py-2.5 text-sm font-medium active:scale-95 transition-transform">Annulla</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── STUDY ──────────────────────────────────────────────────────── */
function StudyView({quotes}){
  const [mode,setMode]=useState(null);
  const [sq,setSq]=useState([]);
  const [ci,setCi]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [score,setScore]=useState({ok:0,total:0});
  const [exercise,setExercise]=useState(null);
  const [answers,setAnswers]=useState({});
  const [feedback,setFeedback]=useState(null);
  const [done,setDone]=useState(false);
  const [fcType,setFcType]=useState(null);

  const start=m=>{
    const base=m==="flashcard"?quotes.filter(q=>q.author&&q.author.trim()):quotes;
    const s=[...base].sort(()=>Math.random()-.5);
    setSq(s); setCi(0); setFlipped(false); setScore({ok:0,total:0});
    setAnswers({}); setFeedback(null); setDone(false); setMode(m);
    if(m==="blank"&&s.length) setExercise(buildEx(s[0],quotes));
  };

  const startFlashcards=type=>{
    if(!quotes.some(q=>q.author&&q.author.trim())){ setMode("flashcard-empty"); return; }
    setFcType(type);
    start("flashcard");
  };

  const advance=ok=>{
    const ns={ok:score.ok+(ok?1:0),total:score.total+1};
    if(ci+1>=sq.length){ setScore(ns); setDone(true); }
    else{
      const n=ci+1; setCi(n); setFlipped(false); setScore(ns);
      setAnswers({}); setFeedback(null);
      if(mode==="blank") setExercise(buildEx(sq[n],quotes));
    }
  };

  const pick=(pos,opt)=>{
    if(answers[pos]!==undefined) return;
    const correct=opt===exercise.blanks[pos].raw;
    const newA={...answers,[pos]:{opt,correct}};
    setAnswers(newA);
    if(Object.keys(exercise.blanks).every(p=>newA[Number(p)]!==undefined)){
      const allOk=Object.values(newA).every(a=>a.correct);
      setFeedback(allOk?"correct":"wrong");
      setTimeout(()=>advance(allOk),1800);
    }
  };

  /* Lista vuota */
  if(!quotes.length) return (
    <div className="flex flex-col items-center justify-center min-h-screen p-10 text-center gap-4 pb-24">
      <span className="text-6xl">🎯</span>
      <h2 className="text-xl font-bold" style={{color:CT}}>Nessun versetto da studiare</h2>
      <p className="text-gray-500">Aggiungi prima i tuoi versetti nella sezione <strong style={{color:CT}}>Approfondimento</strong>.</p>
    </div>
  );

  /* Schermata risultato */
  if(done){
    const pct=Math.round(score.ok/score.total*100);
    return (
      <div className="flex flex-col items-center justify-center min-h-screen p-10 text-center gap-5 pb-24">
        <span className="text-7xl">{pct>=80?"🏆":pct>=50?"👏":"💪"}</span>
        <h2 className="text-2xl font-bold" style={{color:CT}}>Sessione completata!</h2>
        <div className="w-32 h-32 rounded-full flex flex-col items-center justify-center text-white shadow-xl"
             style={{background:grad(score.ok)}}>
          <span className="text-4xl font-bold">{pct}%</span>
          <span className="text-xs opacity-80 font-medium">{score.ok}/{score.total} corrette</span>
        </div>
        <p className="text-gray-500 text-sm">{pct>=80?"Ottimo lavoro! Stai memorizzando bene.":pct>=50?"Buona continuità! Riprova per migliorare.":"Continua a esercitarti, ci vorrà poco!"}</p>
        <div className="flex gap-3">
          <button onClick={()=>start(mode)} className="text-white rounded-xl px-6 py-3 font-bold shadow-md" style={{background:grad(2)}}>Riprova</button>
          <button onClick={()=>{setMode(null);setDone(false);}} className="bg-gray-100 text-gray-700 rounded-xl px-6 py-3 font-medium">Menu</button>
        </div>
      </div>
    );
  }

  /* Menu principale Studia */
  if(!mode) return (
    <div className="p-5 pt-10 pb-24">
      <h1 className="text-2xl font-bold mb-1" style={{color:CT}}>Studia</h1>
      <p className="text-sm text-gray-400 mb-8">
        {quotes.length} {quotes.length===1?"versetto":"versetti"} nel tuo archivio
      </p>
      <div className="flex flex-col gap-4">
        {[
          {id:"flashcard",icon:"🃏",title:"Flashcard",
           desc:"Scegli se allenarti a ricordare il libro di un versetto o il versetto esatto di un libro."},
          {id:"blank",icon:"✏️",title:"Completa il versetto",
           desc:"Alcune parole del versetto sono nascoste. Scegli quella corretta tra quattro opzioni."}
        ].map((opt,i)=>(
          <button key={opt.id}
            onClick={()=>opt.id==="flashcard"?setMode("flashcard-select"):start(opt.id)}
            className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 text-left flex gap-4 items-start active:scale-95 transition-transform">
            <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl shrink-0" style={{background:grad(i*3)}}>
              {opt.icon}
            </div>
            <div className="pt-0.5">
              <h3 className="font-bold mb-1" style={{color:CT}}>{opt.title}</h3>
              <p className="text-sm text-gray-500 leading-relaxed">{opt.desc}</p>
            </div>
          </button>
        ))}
      </div>
    </div>
  );

  /* Selezione tipo flashcard */
  if(mode==="flashcard-select") return (
    <div className="p-5 pt-10 pb-24">
      <button onClick={()=>setMode(null)} className="text-gray-400 text-sm font-medium mb-6 active:text-gray-600">← Menu</button>
      <h1 className="text-2xl font-bold mb-1" style={{color:CT}}>Flashcard</h1>
      <p className="text-sm text-gray-400 mb-8">Cosa vuoi indovinare?</p>
      <div className="flex flex-col gap-4">
        {[
          {id:"phrase", icon:"📖", title:"Il versetto",
           desc:"Vedi il libro (es: Giovanni 3 16) e prova a ricordare il versetto esatto."},
          {id:"author", icon:"📚", title:"Il libro",
           desc:"Vedi il versetto e prova a ricordare a quale libro appartiene (Nome Capitolo Versetto/i)."}
        ].map((opt,i)=>(
          <button key={opt.id} onClick={()=>startFlashcards(opt.id)}
            className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 text-left flex gap-4 items-start active:scale-95 transition-transform">
            <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl shrink-0" style={{background:grad(i+1)}}>
              {opt.icon}
            </div>
            <div className="pt-0.5">
              <h3 className="font-bold mb-1" style={{color:CT}}>{opt.title}</h3>
              <p className="text-sm text-gray-500 leading-relaxed">{opt.desc}</p>
            </div>
          </button>
        ))}
      </div>
    </div>
  );

  /* Nessun libro disponibile */
  if(mode==="flashcard-empty") return (
    <div className="flex flex-col items-center justify-center min-h-screen p-10 text-center gap-4 pb-24">
      <span className="text-6xl">✍️</span>
      <h2 className="text-xl font-bold" style={{color:CT}}>Nessun libro disponibile</h2>
      <p className="text-gray-500">Per usare le flashcard aggiungi il libro ai tuoi versetti nella sezione <strong style={{color:CT}}>Approfondimento</strong>.</p>
      <button onClick={()=>setMode(null)} className="bg-gray-100 text-gray-700 rounded-xl px-6 py-3 font-medium">Menu</button>
    </div>
  );

  const curQ=sq[ci];
  const progBar=(
    <div className="flex items-center gap-2 px-4 pt-10 pb-3">
      <button onClick={()=>setMode(null)} className="text-gray-400 text-sm font-medium mr-1 active:text-gray-600">← Menu</button>
      <div className="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
        <div className="h-full rounded-full transition-all duration-500" style={{width:`${ci/sq.length*100}%`,background:grad(ci)}}/>
      </div>
      <span className="text-xs text-gray-400 font-semibold">{ci+1}/{sq.length}</span>
    </div>
  );

  /* ── Flashcard ── */
  if(mode==="flashcard"){
    /*
      fcType "author" → l'utente vuole indovinare il LIBRO
        fronte: mostra il versetto (testo)   → indovina il libro
        retro:  mostra il libro (author)
      fcType "phrase" → l'utente vuole indovinare il VERSETTO
        fronte: mostra il libro (author)     → indovina il versetto
        retro:  mostra il versetto (testo)
    */
    const guessBook = fcType==="author";
    const frontLabel = guessBook ? "Versetto"  : "Libro";
    const backLabel  = guessBook ? "Libro"     : "Versetto";
    const hint       = guessBook
      ? "A quale libro appartiene? Tocca per scoprirlo →"
      : "Qual è il versetto esatto? Tocca per scoprirlo →";

    return (
      <div className="flex flex-col h-full p-4 pb-6">
        {progBar}
        <div onClick={()=>!flipped&&setFlipped(true)}
          className={`flex-1 bg-white rounded-3xl shadow-sm border border-gray-100 p-6 flex flex-col justify-between my-3 transition-all duration-300 ${!flipped?"cursor-pointer active:scale-95":""}`}
          style={{minHeight:260}}>
          {!flipped ? (
            <div className="flex flex-col h-full">
              <p className="text-xs text-gray-400 uppercase tracking-widest font-semibold mb-4">{frontLabel}</p>
              <div className="flex-1 flex flex-col justify-center">
                {guessBook ? (
                  <>
                    <p className="text-gray-200 text-6xl font-serif leading-none select-none">"</p>
                    <p className="text-gray-800 text-lg font-semibold leading-relaxed px-2 -mt-1">{curQ.text}</p>
                    <p className="text-gray-200 text-6xl font-serif leading-none text-right -mt-2 select-none">"</p>
                  </>
                ) : (
                  <p className="text-2xl font-bold text-center px-2" style={{color:CT}}>— {curQ.author} —</p>
                )}
              </div>
              <p className="text-center text-xs mt-4 font-medium" style={{color:CS}}>{hint}</p>
            </div>
          ) : (
            <div className="flex flex-col h-full">
              <p className="text-xs text-gray-400 uppercase tracking-widest font-semibold mb-4">{backLabel}</p>
              <div className="flex-1 flex items-center justify-center">
                {guessBook ? (
                  <p className="text-2xl font-bold text-center px-2" style={{color:CT}}>{curQ.author}</p>
                ) : (
                  <div>
                    <p className="text-gray-200 text-6xl font-serif leading-none select-none">"</p>
                    <p className="text-gray-700 text-lg font-semibold leading-relaxed px-2 -mt-1">{curQ.text}</p>
                    <p className="text-gray-200 text-6xl font-serif leading-none text-right -mt-2 select-none">"</p>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
        {flipped && (
          <div className="flex gap-3">
            <button onClick={()=>advance(false)} className="flex-1 bg-red-50 text-red-500 rounded-2xl py-4 text-sm font-bold active:scale-95 transition-transform">😕 Da rivedere</button>
            <button onClick={()=>advance(true)}  className="flex-1 bg-green-50 text-green-600 rounded-2xl py-4 text-sm font-bold active:scale-95 transition-transform">✅ Ricordato!</button>
          </div>
        )}
      </div>
    );
  }

  /* ── Completa il versetto ── */
  if(mode==="blank"&&exercise){
    const {words,blanks}=exercise;
    const bKeys=Object.keys(blanks).map(Number);
    const nextPos=bKeys.find(p=>answers[p]===undefined);
    return (
      <div className="flex flex-col h-full">
        {progBar}
        <div className="flex-1 overflow-y-auto px-4 pb-6 flex flex-col gap-3">
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
            <p className="text-xs text-gray-400 uppercase tracking-widest font-semibold mb-3">Completa il versetto</p>
            <div className="text-sm leading-9 flex flex-wrap gap-1 items-baseline" style={{color:CT}}>
              {words.map((word,i)=>{
                if(!blanks[i]) return <span key={i}>{word}{" "}</span>;
                const ans=answers[i];
                return (
                  <span key={i} className={`inline-block mx-0.5 px-2.5 py-0.5 rounded-lg font-bold text-sm border-2 min-w-12 text-center transition-all ${
                    ans
                      ? ans.correct ? "bg-green-100 text-green-700 border-green-300" : "bg-red-100 text-red-500 border-red-200 line-through"
                      : "border-dashed"
                  }`}
                    style={!ans ? {backgroundColor:CP+"12",color:CP+"aa",borderColor:CP+"55"} : {}}>
                    {ans ? ans.opt : "  "}
                  </span>
                );
              })}
            </div>
            {curQ.author && <p className="text-gray-400 text-xs text-right mt-3 font-medium">— {curQ.author}</p>}
          </div>

          {!bKeys.length && (
            <div className="bg-white rounded-2xl p-5 text-center">
              <p className="text-gray-500 text-sm mb-3">Versetto troppo breve per questo esercizio</p>
              <button onClick={()=>advance(true)} className="text-white rounded-xl px-5 py-2 text-sm font-bold" style={{background:grad(0)}}>Continua →</button>
            </div>
          )}

          {nextPos!==undefined && (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
              <p className="text-xs text-gray-500 font-semibold mb-3">Scegli la parola mancante:</p>
              <div className="grid grid-cols-2 gap-2">
                {blanks[nextPos].options.map((opt,i)=>(
                  <button key={i} onClick={()=>pick(nextPos,opt)}
                    className="btn-opt bg-gray-50 border-2 border-gray-200 rounded-xl py-3.5 text-sm font-semibold text-gray-700 active:scale-95 transition-all">
                    {opt}
                  </button>
                ))}
              </div>
            </div>
          )}

          {feedback && (
            <div className={`rounded-2xl p-4 text-center font-bold text-sm ${
              feedback==="correct" ? "bg-green-50 text-green-700 border border-green-200" : "bg-orange-50 text-orange-600 border border-orange-200"
            }`}>
              {feedback==="correct" ? "✅ Perfetto! Tutte le parole corrette!" : "💡 Quasi! Ripassalo ancora."}
            </div>
          )}
        </div>
      </div>
    );
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
